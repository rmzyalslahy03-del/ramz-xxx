<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>صندوق الوارد | Ramz-X</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #000;
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            padding-bottom: 70px;
            transition: background 0.3s;
        }
        body.dark { background-color: #000; }
        body.light { background-color: #f5f5f5; }
        body.light .inbox-container,
        body.light .header,
        body.light .main-tabs,
        body.light .sub-tabs,
        body.light .list-item,
        body.light .chat-modal,
        body.light .chat-header,
        body.light .chat-input-area,
        body.light .message-bubble.received {
            background-color: #fff;
            color: #000;
        }
        body.light .header h1,
        body.light .item-name,
        body.light .chat-name {
            color: #000;
        }
        body.light .item-detail,
        body.light .item-time {
            color: #555;
        }
        body.light .main-tab,
        body.light .sub-tab {
            color: #555;
        }
        body.light .main-tab.active,
        body.light .sub-tab.active {
            color: #ff0050;
        }
        body.light .list-item {
            border-bottom-color: #e0e0e0;
        }
        body.light .message-bubble.received {
            background: #e0e0e0;
            color: #000;
        }
        .inbox-container {
            max-width: 500px;
            margin: 0 auto;
            background: #000;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: #000;
            border-bottom: 0.5px solid #2c2c2c;
        }
        .back-btn, .new-chat-btn {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }
        .header h1 {
            color: white;
            font-size: 20px;
            font-weight: bold;
        }
        .main-tabs {
            display: flex;
            overflow-x: auto;
            white-space: nowrap;
            border-bottom: 0.5px solid #2c2c2c;
            background: #000;
        }
        .main-tab {
            padding: 12px 20px;
            background: none;
            border: none;
            color: #aaa;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: 0.2s;
        }
        .main-tab.active {
            color: white;
            border-bottom-color: #ff0050;
        }
        .sub-tabs {
            display: flex;
            overflow-x: auto;
            background: #111;
            border-bottom: 0.5px solid #2c2c2c;
        }
        .sub-tab {
            padding: 10px 16px;
            background: none;
            border: none;
            color: #aaa;
            font-size: 13px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }
        .sub-tab.active {
            color: #ff0050;
            border-bottom-color: #ff0050;
        }
        .content-area {
            padding: 8px 0;
        }
        .list-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            gap: 14px;
            border-bottom: 0.5px solid #1f1f1f;
            cursor: pointer;
            transition: 0.2s;
        }
        .list-item:active { background: #111; }
        .item-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            background: #2c2c2c;
        }
        .item-info { flex: 1; }
        .item-name {
            font-weight: 700;
            color: white;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .item-detail {
            font-size: 13px;
            color: #aaa;
            margin-top: 2px;
        }
        .item-time {
            font-size: 11px;
            color: #777;
        }
        .badge {
            background: #ff0050;
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 11px;
            font-weight: bold;
            color: white;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        .chat-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.3s ease;
        }
        .chat-modal.open { transform: translateX(0); }
        .chat-header {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: #000;
            border-bottom: 0.5px solid #2c2c2c;
            gap: 12px;
        }
        .chat-back {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }
        .chat-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
        }
        .chat-name {
            flex: 1;
            font-weight: bold;
            color: white;
            font-size: 17px;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            position: relative;
        }
        .message-wrapper.sent { align-self: flex-end; }
        .message-wrapper.received { align-self: flex-start; }
        .message-bubble {
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 15px;
            word-wrap: break-word;
        }
        .received .message-bubble {
            background: #2c2c2c;
            color: white;
            border-bottom-left-radius: 4px;
        }
        .sent .message-bubble {
            background: #ff0050;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .media-attachment {
            max-width: 200px;
            border-radius: 16px;
            margin-top: 6px;
            cursor: pointer;
        }
        .reply-to {
            font-size: 12px;
            color: #ccc;
            background: rgba(255,255,255,0.1);
            padding: 4px 8px;
            border-radius: 12px;
            margin-bottom: 4px;
        }
        .chat-input-area {
            display: flex;
            align-items: center;
            padding: 12px;
            background: #111;
            border-top: 0.5px solid #2c2c2c;
            gap: 8px;
            flex-wrap: wrap;
        }
        .attach-btn, .emoji-btn {
            background: #2c2c2c;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }
        .chat-input {
            flex: 1;
            background: #2c2c2c;
            border: none;
            border-radius: 30px;
            padding: 12px 16px;
            color: white;
            font-size: 15px;
            outline: none;
        }
        .send-btn {
            background: #ff0050;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }
        .emoji-picker {
            display: none;
            position: absolute;
            bottom: 70px;
            left: 16px;
            background: #2c2c2c;
            border-radius: 30px;
            padding: 6px 12px;
            gap: 12px;
            z-index: 1100;
        }
        .emoji-picker.active { display: flex; }
        .emoji-option {
            font-size: 24px;
            cursor: pointer;
            padding: 4px;
        }
        .bottom-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: #fff;
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            border-top: 1px solid #ddd;
            z-index: 30;
        }
        body.dark .bottom-footer {
            background-color: #111;
            border-top-color: #2c2c2c;
        }
        .footer-button {
            background: none;
            border: none;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            color: #333;
            text-decoration: none;
        }
        body.dark .footer-button { color: #aaa; }
        .footer-button:hover {
            color: #ff0050;
            transform: scale(1.05);
        }
        .icon { font-size: 22px; display: block; margin-bottom: 4px; }
        .label { font-size: 11px; }
        #globalToast {
            position: fixed;
            bottom: 80px;
            left: 20px;
            right: 20px;
            background: #1f1f1f;
            color: white;
            padding: 12px 16px;
            border-radius: 40px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            font-size: 14px;
            border-left: 4px solid #fe2c55;
        }
    </style>
</head>
<body>
<div class="inbox-container">
    <div class="header">
        <button class="back-btn" onclick="window.location.href='home.html'"><i class="fas fa-arrow-right"></i></button>
        <h1>صندوق الوارد</h1>
        <button class="new-chat-btn" id="newChatBtn"><i class="fas fa-edit"></i></button>
    </div>

    <div class="main-tabs" id="mainTabs">
        <button class="main-tab active" data-main="chats">المحادثات</button>
        <button class="main-tab" data-main="requests">طلبات المراسلة</button>
        <button class="main-tab" data-main="notifications">الإشعارات</button>
        <button class="main-tab" data-main="interactions">التفاعلات</button>
        <button class="main-tab" data-main="system">إشعارات النظام</button>
        <button class="main-tab" data-main="privacy">خصوصية الظهور</button>
    </div>

    <div id="mainContent" class="content-area"></div>
</div>

<div class="bottom-footer">
    <a href="home.html" class="footer-button"><i class="fas fa-home icon"></i><div class="label">الرئيسية</div></a>
    <a href="explore.html" class="footer-button"><i class="fas fa-compass icon"></i><div class="label">استكشاف</div></a>
    <a href="create-post.html" class="footer-button"><i class="fas fa-plus-circle icon"></i><div class="label">إنشاء</div></a>
    <a href="inbox.html" class="footer-button"><i class="fas fa-inbox icon"></i><div class="label">صندوق الوارد</div></a>
    <a href="profile.html" class="footer-button"><i class="fas fa-user icon"></i><div class="label">الملف الشخصي</div></a>
</div>

<!-- مودال المحادثة -->
<div id="chatModal" class="chat-modal">
    <div class="chat-header">
        <button class="chat-back" id="closeChatBtn"><i class="fas fa-arrow-right"></i></button>
        <img id="chatAvatar" class="chat-avatar" src="">
        <div id="chatName" class="chat-name"></div>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-area">
        <button class="attach-btn" id="attachBtn"><i class="fas fa-paperclip"></i></button>
        <button class="emoji-btn" id="emojiBtn"><i class="far fa-smile-wink"></i></button>
        <input type="text" id="messageInput" class="chat-input" placeholder="اكتب رسالة...">
        <button id="sendMessageBtn" class="send-btn"><i class="fas fa-paper-plane"></i></button>
    </div>
    <div class="emoji-picker" id="emojiPicker">
        <span class="emoji-option" data-emoji="❤️">❤️</span>
        <span class="emoji-option" data-emoji="😂">😂</span>
        <span class="emoji-option" data-emoji="😮">😮</span>
        <span class="emoji-option" data-emoji="😢">😢</span>
        <span class="emoji-option" data-emoji="😡">😡</span>
        <span class="emoji-option" data-emoji="👍">👍</span>
    </div>
</div>

<div id="globalToast"></div>

<!-- ========== ترتيب تحميل السكربتات الصحيح ========== -->
<!-- 1. مكتبة Supabase CDN (أولاً) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<!-- 2. ملف common.js (الذي يعتمد على supabase) -->
<script src="common.js"></script>
<!-- 3. كود الصفحة (يستخدم دوال common.js) -->
<script>
    let currentUser = null;
    let activeChatId = null;
    let replyingToMessage = null;
    let currentMediaFile = null;
    let subscriptions = [];

    // ---------------------- دوال المساعدة للمحادثات ----------------------
    async function fetchConversations() {
        if (!currentUser) return [];
        const { data: messages, error } = await supabase
            .from('messages')
            .select(`
                id, text, image, created_at, read,
                sender:sender_id (id, username, avatar),
                receiver:receiver_id (id, username, avatar)
            `)
            .or(`sender_id.eq.${currentUser.id},receiver_id.eq.${currentUser.id}`)
            .order('created_at', { ascending: false });
        if (error) {
            console.error(error);
            return [];
        }
        const convMap = new Map();
        for (let msg of messages) {
            const other = (msg.sender.id === currentUser.id) ? msg.receiver : msg.sender;
            if (!convMap.has(other.id)) {
                convMap.set(other.id, {
                    id: other.id,
                    name: other.username,
                    avatar: other.avatar || 'https://randomuser.me/api/portraits/lego/1.jpg',
                    lastMessage: msg.text || (msg.image ? '📷 صورة' : ''),
                    lastTime: msg.created_at,
                    unread: 0
                });
            }
            if (msg.receiver.id === currentUser.id && !msg.read) {
                convMap.get(other.id).unread++;
            }
        }
        const convs = Array.from(convMap.values());
        convs.sort((a,b) => new Date(b.lastTime) - new Date(a.lastTime));
        return convs;
    }

    async function fetchMessages(otherUserId) {
        const { data, error } = await supabase
            .from('messages')
            .select('*')
            .or(`and(sender_id.eq.${currentUser.id},receiver_id.eq.${otherUserId}),and(sender_id.eq.${otherUserId},receiver_id.eq.${currentUser.id})`)
            .order('created_at', { ascending: true });
        if (error) {
            showToast(error.message, true);
            return [];
        }
        const unreadIds = data.filter(m => m.receiver_id === currentUser.id && !m.read).map(m => m.id);
        if (unreadIds.length) {
            await supabase.from('messages').update({ read: true }).in('id', unreadIds);
        }
        return data.map(m => ({
            id: m.id,
            text: m.text,
            sender: m.sender_id === currentUser.id ? 'me' : 'other',
            time: new Date(m.created_at).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }),
            image: m.image,
            replyTo: m.reply_to,
            reactions: m.reactions || []
        }));
    }

    async function sendMessageTo(otherUserId, text, image) {
        if (!text && !image) return;
        const newMsg = {
            sender_id: currentUser.id,
            receiver_id: otherUserId,
            text: text || '',
            image: image || null,
            reply_to: replyingToMessage,
            created_at: new Date(),
            read: false
        };
        const { error } = await supabase.from('messages').insert(newMsg);
        if (error) showToast(error.message, true);
        replyingToMessage = null;
    }

    function subscribeToMessages() {
        if (!currentUser) return;
        const subscription = supabase
            .channel('messages-channel')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `receiver_id=eq.${currentUser.id}` }, (payload) => {
                if (activeChatId && (payload.new.sender_id === activeChatId)) refreshMessages();
                renderConversations();
            })
            .subscribe();
        subscriptions.push(subscription);
    }

    async function refreshMessages() {
        if (!activeChatId) return;
        const msgs = await fetchMessages(activeChatId);
        renderChatMessages(msgs);
    }

    async function renderConversations() {
        const convs = await fetchConversations();
        const container = document.getElementById('mainContent');
        if (!convs.length) {
            container.innerHTML = '<div class="empty-state"><i class="far fa-comment-dots"></i><p>لا توجد محادثات</p></div>';
            return;
        }
        let html = '';
        for (let c of convs) {
            html += `
                <div class="list-item" data-chat-id="${c.id}">
                    <img src="${c.avatar}" class="item-avatar" onerror="this.src='https://randomuser.me/api/portraits/lego/1.jpg'">
                    <div class="item-info">
                        <div class="item-name">${escapeHtml(c.name)}</div>
                        <div class="item-detail">${escapeHtml(c.lastMessage)}</div>
                    </div>
                    <div class="item-time">${new Date(c.lastTime).toLocaleString()}</div>
                    ${c.unread ? `<div class="badge">${c.unread}</div>` : ''}
                </div>
            `;
        }
        container.innerHTML = html;
        document.querySelectorAll('[data-chat-id]').forEach(el => {
            el.addEventListener('click', () => openChat(parseInt(el.dataset.chatId)));
        });
    }

    async function openChat(otherUserId) {
        activeChatId = otherUserId;
        const { data: otherUser, error } = await supabase
            .from('users')
            .select('username, avatar')
            .eq('id', otherUserId)
            .single();
        if (error) { showToast(error.message, true); return; }
        document.getElementById('chatName').innerText = otherUser.username;
        document.getElementById('chatAvatar').src = otherUser.avatar || 'https://randomuser.me/api/portraits/lego/1.jpg';
        const messages = await fetchMessages(otherUserId);
        renderChatMessages(messages);
        document.getElementById('chatModal').classList.add('open');
        replyingToMessage = null;
        currentMediaFile = null;
        document.getElementById('messageInput').placeholder = "اكتب رسالة...";
    }

    function renderChatMessages(messages) {
        const container = document.getElementById('chatMessages');
        container.innerHTML = '';
        for (let msg of messages) {
            const wrapper = document.createElement('div');
            wrapper.className = 'message-wrapper ' + msg.sender;
            wrapper.setAttribute('data-msg-id', msg.id);
            let replyHtml = '';
            if (msg.replyTo) replyHtml = `<div class="reply-to"><i class="fas fa-reply"></i> رد على رسالة</div>`;
            let mediaHtml = '';
            if (msg.image) mediaHtml = `<img src="${msg.image}" class="media-attachment" onclick="window.open('${msg.image}')">`;
            wrapper.innerHTML = `
                ${replyHtml}
                <div class="message-bubble">${escapeHtml(msg.text)}${mediaHtml}</div>
                <div class="message-actions">
                    <span class="action-icon" data-action="reply"><i class="fas fa-reply"></i> رد</span>
                </div>
            `;
            container.appendChild(wrapper);
        }
        container.scrollTop = container.scrollHeight;
        document.querySelectorAll('.action-icon[data-action="reply"]').forEach(btn => {
            btn.onclick = (e) => {
                e.stopPropagation();
                const msgId = parseInt(btn.closest('.message-wrapper').dataset.msgId);
                replyingToMessage = msgId;
                document.getElementById('messageInput').placeholder = "رد على رسالة...";
            };
        });
    }

    async function sendMessage() {
        let text = document.getElementById('messageInput').value.trim();
        if (!text && !currentMediaFile) return;
        if (!activeChatId) return;
        let image = currentMediaFile ? currentMediaFile.url : null;
        await sendMessageTo(activeChatId, text, image);
        document.getElementById('messageInput').value = '';
        replyingToMessage = null;
        currentMediaFile = null;
        document.getElementById('messageInput').placeholder = "اكتب رسالة...";
        const messages = await fetchMessages(activeChatId);
        renderChatMessages(messages);
        renderConversations();
    }

    function closeChat() {
        document.getElementById('chatModal').classList.remove('open');
        activeChatId = null;
    }

    // التبويبات الأخرى (نماذج مبسطة)
    function renderRequests() { document.getElementById('mainContent').innerHTML = '<div class="empty-state"><i class="far fa-envelope"></i><p>لا توجد طلبات مراسلة</p></div>'; }
    function renderNotifications() { document.getElementById('mainContent').innerHTML = '<div class="empty-state"><i class="far fa-bell"></i><p>لا توجد إشعارات</p></div>'; }
    function renderInteractions() { document.getElementById('mainContent').innerHTML = '<div class="empty-state"><i class="far fa-heart"></i><p>لا توجد تفاعلات</p></div>'; }
    function renderSystem() { document.getElementById('mainContent').innerHTML = '<div class="empty-state"><i class="fas fa-cog"></i><p>لا توجد إشعارات نظام</p></div>'; }
    function renderPrivacy() {
        let onlineStatus = localStorage.getItem('onlineStatus') || 'online';
        const html = `
            <div style="padding:20px;"><div style="background:#1a1a1a; border-radius:16px; padding:16px;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div><h3 style="color:white;">حالة الظهور للأصدقاء</h3><p style="color:#aaa;">${onlineStatus === 'online' ? 'نشط (علامة زرقاء)' : 'مخفي (علامة سوداء)'}</p></div>
                    <div><i class="fas fa-circle" style="color:${onlineStatus === 'online' ? '#4ade80' : '#333'}; font-size:32px;"></i></div>
                </div>
                <button id="toggleStatusBtn" style="background:#ff0050; border:none; padding:10px; border-radius:30px; color:white; width:100%; margin-top:16px;">${onlineStatus === 'online' ? 'تبديل إلى الوضع المخفي' : 'تبديل إلى النشط'}</button>
            </div></div>
        `;
        document.getElementById('mainContent').innerHTML = html;
        document.getElementById('toggleStatusBtn')?.addEventListener('click', () => {
            const newStatus = onlineStatus === 'online' ? 'offline' : 'online';
            localStorage.setItem('onlineStatus', newStatus);
            renderPrivacy();
        });
    }

    let currentMainTab = 'chats';
    async function renderMainTab() {
        if (currentMainTab === 'chats') await renderConversations();
        else if (currentMainTab === 'requests') renderRequests();
        else if (currentMainTab === 'notifications') renderNotifications();
        else if (currentMainTab === 'interactions') renderInteractions();
        else if (currentMainTab === 'system') renderSystem();
        else if (currentMainTab === 'privacy') renderPrivacy();
    }

    function setMainTab(tabId) {
        currentMainTab = tabId;
        document.querySelectorAll('.main-tab').forEach(tab => {
            if (tab.dataset.main === tabId) tab.classList.add('active');
            else tab.classList.remove('active');
        });
        renderMainTab();
    }

    // الأحداث
    document.querySelectorAll('.main-tab').forEach(tab => {
        tab.addEventListener('click', () => setMainTab(tab.dataset.main));
    });
    document.getElementById('closeChatBtn').addEventListener('click', closeChat);
    document.getElementById('sendMessageBtn').addEventListener('click', sendMessage);
    document.getElementById('messageInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    document.getElementById('newChatBtn').addEventListener('click', () => showToast("✨ قريباً: البحث عن مستخدمين جدد"));
    document.getElementById('attachBtn').addEventListener('click', () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    currentMediaFile = { type: 'image', url: ev.target.result };
                    document.getElementById('messageInput').placeholder = "أضف نصاً (اختياري) ثم أرسل";
                };
                reader.readAsDataURL(file);
            }
        };
        input.click();
    });
    document.getElementById('emojiBtn').addEventListener('click', () => {
        document.getElementById('emojiPicker').classList.toggle('active');
    });
    document.querySelectorAll('.emoji-option').forEach(emoji => {
        emoji.addEventListener('click', () => {
            document.getElementById('messageInput').value += emoji.dataset.emoji;
            document.getElementById('emojiPicker').classList.remove('active');
            document.getElementById('messageInput').focus();
        });
    });
    document.addEventListener('click', (e) => {
        const btn = document.getElementById('emojiBtn');
        const picker = document.getElementById('emojiPicker');
        if (!btn.contains(e.target) && !picker.contains(e.target)) picker.classList.remove('active');
    });

    // الوضع الليلي
    function applyTheme() {
        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark');
            document.body.classList.remove('light');
        } else {
            document.body.classList.add('light');
            document.body.classList.remove('dark');
        }
    }
    document.getElementById('darkModeToggle')?.addEventListener('click', () => {
        localStorage.setItem('darkMode', !document.body.classList.contains('dark'));
        applyTheme();
    });
    applyTheme();

    // بدء التشغيل
    (async () => {
        await initDB();
        currentUser = await checkSession();
        if (!currentUser) return;
        subscribeToMessages();
        setMainTab('chats');
    })();
</script>
</body>
</html>
